<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Armstrong Number Checker</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container{
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0px 0px 10px gray;
        }

        input{
            padding: 10px;
            width: 200px;
            font-size: 16px;
            margin-top: 10px;
        }

        button{
            padding: 10px 20px;
            margin-top: 15px;
            font-size: 16px;
            cursor: pointer;
            background-color: blue;
            color: white;
            border: none;
            border-radius: 5px;
        }

        #result{
            margin-top: 20px;
            font-size: 20px;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>Armstrong Number Checker</h2>

        <input type="number" id="num" placeholder="Enter a number">

        <br>

        <button onclick="checkArmstrong()">Check</button>

        <div id="result"></div>
    </div>

    <script>

        function solve(...args) {

            const num = Number(args[0]);

            let temp = num;
            let sum = 0;

            while(temp > 0){

                let digit = temp % 10;

                sum = sum + digit * digit * digit;

                temp = Math.floor(temp / 10);
            }

            let result;

            if(sum === num){
                result = "Armstrong Number";
            }
            else{
                result = "Not an Armstrong Number";
            }

            return result;
        }

        function checkArmstrong(){

            const number = document.getElementById("num").value;

            const answer = solve(number);

            document.getElementById("result").innerHTML = answer;
        }

    </script>

</body>
</html>
